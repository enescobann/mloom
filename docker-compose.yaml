services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mlflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mlflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: mflow-api:v1
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mlflow_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: